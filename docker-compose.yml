services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://safeagent_app:safeagent_password@postgres:5432/safeagent
      - POLICY_DIR=src/policies
      - PROMPT_DIR=src/prompts
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen2.5:7b
    volumes:
      - .:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - postgres

  frontend:
    build: ./sys-frontend
    ports:
      - "3000:80"
    depends_on:
      - api

  postgres:
    image: postgres:16
    container_name: safeagent-postgres
    environment:
      - POSTGRES_DB=safeagent
      - POSTGRES_USER=safeagent_app
      - POSTGRES_PASSWORD=young0808
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
