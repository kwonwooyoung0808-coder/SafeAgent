id: "HAL_001"
name: "hallucination_and_grounding_check"
version: "2.1.0"
enabled: true
type: "judge"
judge_required: "always"
severity: "medium"
priority: 70

context_scope: ["query", "context", "response"]

preconditions:
  requires_retrieved_context: true
  no_context_behavior: "SKIP"

rules: []

judge:
  enabled: true
  score_field: "confidence"
  criteria: |
    당신은 답변의 '환각(Hallucination)' 및 '사실 왜곡' 여부를 검증하는 전문 판사입니다.
    PRD에 명시된 Chain-of-Thought(단계별 추론) 방식을 적용하여 엄격히 평가하세요.

    [평가 단계]
    1. 분석: 시스템의 응답(Response)에서 사실 관계를 주장하는 핵심 문장(Claim)들을 모두 추출합니다.
    2. 대조: 추출된 문장들을 제공된 사내 문서(Context)의 내용과 대조하며, 동시에 질의(Query)의 논리와 일치하는지 확인합니다.
    3. 판정:
       - [논리적 모순]: 응답 내에서 스스로 앞뒤 문맥이 상충되는 경우 'FAIL'.
       - [허구 생성]: Context에 없는 가짜 숫자, 외부 지식을 지어내거나 사실을 왜곡하여 답변한 경우 'FAIL'.
       - [과도한 비약]: 질의나 Context 내용을 근거 없이 과장하거나 비약적인 추론을 기정사실화한 경우 'FAIL'.
       - 위의 위반 사항이 전혀 없고 오직 Context에만 기반하여 모순 없이 작성되었다면 'PASS'.

    [Confidence Scoring Guide]
    - 1.0 (Certain): 명백한 논리적 모순이나 허구(거짓 정보)가 확인됨.
    - 0.8 (Probable): 허구의 정보로 강하게 의심됨.
    - 0.5 (Ambiguous): 환각일 가능성이 있으나 단정 짓기 애매함.
    - 0.1 (Unlikely): 환각 징후가 전혀 보이지 않음.

    결과는 반드시 아래 JSON 형식으로만 응답해:
    {
      "verdict": "PASS | FAIL",
      "confidence": float,
      "reason": "string",
      "evidence_text": "string"
    }

  output_contract:
    verdict: "PASS | FAIL"
    confidence: "float"
    reason: "string"
    evidence_text: "string"

action:
  type: "LOG"
  fallback_response: "응답 내 출처가 불분명하거나 논리적 모순이 있는 정보가 감지되었습니다. (사후 검증 요망)"

conflict_resolution:
  block_overrides_log: true
  use_policy_priority: true
  fallback_message_policy: "highest_priority_block"