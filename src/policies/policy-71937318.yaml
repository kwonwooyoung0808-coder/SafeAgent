  criteria: "다음 항목은 회사 규정 문서에서 추출한 응답 검증 기준입니다:\n이 YAML은 회사 규정 문서에서 생성된 검토용 draft입니다.\n\
    source_article/source_text를 기준으로 담당자가 최종 검토해야 합니다.\n- [CC-001] 제1조(목적) 준수 여부 확인:\
    \ 제1조(목적) 이 규정은 회사의 정보시스템과 정보통신의 보안에 관한 필요한 사항을 정하여 회사의 발전을 도모함을 목적으로 한다. (심각도:\
    \ MEDIUM)\n  근거 조항: 제1조\n  근거 원문: 제1조(목적) 이 규정은 회사의 정보시스템과 정보통신의 보안에 관한 필요한 사항을\
    \ 정하여 회사의 발전을 도모함을 목적으로 한다.\n  검토 필요: true\n- [CC-002] 제2조(용어의 정의) 준수 여부 확인: 제2조(용어의\
    \ 정의) 이 규정에서 사용하는 용어의 정의는 다음 각 호와 같다.\n1. “전산실”이란 업무용 전산장비와 공용 네트워크장비가 보관되는 장소를\
    \ 말한다.\n2. “시스템관리자“란 업무 및 연구목적으로 보유하고 있는 정보통신시스템의 운용 및 관리 책임이 있는 해당부서의 부서장을 말한다.\n\
    3. “홈페이지”란 회사의 대표홈페이지 및 회사의 업무와 관련하여 제작하여 대외 서비스하는 모든 것을  (심각도: MEDIUM)\n  근거\
    \ 조항: 제2조\n  근거 원문: 제2조(용어의 정의) 이 규정에서 사용하는 용어의 정의는 다음 각 호와 같다.\n1. “전산실”이란 업무용\
    \ 전산장비와 공용 네트워크장비가 보관되는 장소를 말한다.\n2. “시스템관리자“란 업무 및 연구목적으로 보유하고 있는 정보통신시스템의 운용\
    \ 및 관리 책임이 있는 해당부서의 부서장을 말한다.\n3. “홈페이지”란 회사의 대표홈페이지 및 회사의 업무와 관련하여 제작하여 대외 서비스하는\
    \ 모든 것을 말한다\n4. “정보보안, 정보보호”란 정보통신 수단에 의하여 처리, 저장, 소통되는 정보를 보호하거나 해킹 등 외부 위협으로부터\
    \ 취약요인을 제거하기 위한 각종 수단과 방법을 말한다.\n5. “정보통신시스템”이란 업무처리 혹은 연구목적 수행을 위해 네트워크에 연결하여\
    \ 다수 인원이 이용하는 서버 및 정보통신장비를 말한다\n6. “보조기억매체”란 디스켓, 이동형 하드디스크(HDD), USB메모리, CD (Compact\
    \ Disk), DVD(Digital Versatile Disk), 휴대폰 등 자료를 저장할\n  검토 필요: true\n- [CC-003]\
    \ 제3조(시스템보안 범위) 준수 여부 확인: 제3조(시스템보안 범위) 시스템 보안 관리는 다음 각 호와 같다.\n1. 전산실 보안\n2.\
    \ 정보자료\n3. 개인용 컴퓨터(데스크톱, 노트북, 태블릿, 스마트폰 등)\n4. 이메일 및 유무선 통신망\n5. 홈페이지 등 공개용 웹서버,\
    \ SNS(블로그 등) 관리\n6. 무선랜\n7. 정보통신망 신․증설 및 정보시스템교체 등을 실시할 경우 보안성 검토\n8. 그 밖의 시스템\
    \ 보안업무에 관한 사항 (심각도: MEDIUM)\n  근거 조항: 제3조\n  근거 원문: 제3조(시스템보안 범위) 시스템 보안 관리는 다음\
    \ 각 호와 같다.\n1. 전산실 보안\n2. 정보자료\n3. 개인용 컴퓨터(데스크톱, 노트북, 태블릿, 스마트폰 등)\n4. 이메일 및 유무선\
    \ 통신망\n5. 홈페이지 등 공개용 웹서버, SNS(블로그 등) 관리\n6. 무선랜\n7. 정보통신망 신․증설 및 정보시스템교체 등을 실시할\
    \ 경우 보안성 검토\n8. 그 밖의 시스템 보안업무에 관한 사항\n  검토 필요: true\n- [CC-004] 제4조(전산실 보호대책)\
    \ 준수 여부 확인: 제4조(전산실 보호대책) 전산실 운영부서장은 전산실을 제한구역으로 하고 다음 각 호의 대책을 강구하여야 한다.\n1.\
    \ 방재대책 및 외부로부터의 위해 방지\n2. 전산자료 또는 장비 별 취급자 지정운영\n3. 항시 이용하는 출입문은 한 곳으로 정하고 이중문과\
    \ 보안 장치 설치\n4. 그 밖의 전산업무 비관련자 출입 제한 등 (심각도: MEDIUM)\n  근거 조항: 제4조\n  근거 원문: 제4조(전산실\
    \ 보호대책) 전산실 운영부서장은 전산실을 제한구역으로 하고 다음 각 호의 대책을 강구하여야 한다.\n1. 방재대책 및 외부로부터의 위해 방지\n\
    2. 전산자료 또는 장비 별 취급자 지정운영\n3. 항시 이용하는 출입문은 한 곳으로 정하고 이중문과 보안 장치 설치\n4. 그 밖의 전산업무\
    \ 비관련자 출입 제한 등\n  검토 필요: true\n- [CC-005] 제5조(정보자료 보안관리) 준수 여부 확인: 제5조(정보자료 보안관리)\
    \ ① 시스템관리자는 전산자료 및 보안이 요구된다고 판단되는 전산자료의 유출, 파괴 또는 변조 등에 대비하여 다음 각 호와 같이 보호대책을\
    \ 강구한다.\n1. 전산자료 보유현황 관리\n2. 장비 반·출입 통제\n3. 정보통신망 불법접근 및 컴퓨터바이러스 피해 예방\n4. 중요자료의\
    \ 백업체계 수립 시행\n5. 최신 소프트웨어 보안 패치(patch) 적용\n② 시스템관리자는 인위적 또 (심각도: MEDIUM)\n  근거\
    \ 조항: 제5조\n  근거 원문: 제5조(정보자료 보안관리) ① 시스템관리자는 전산자료 및 보안이 요구된다고 판단되는 전산자료의 유출, 파괴\
    \ 또는 변조 등에 대비하여 다음 각 호와 같이 보호대책을 강구한다.\n1. 전산자료 보유현황 관리\n2. 장비 반·출입 통제\n3. 정보통신망\
    \ 불법접근 및 컴퓨터바이러스 피해 예방\n4. 중요자료의 백업체계 수립 시행\n5. 최신 소프트웨어 보안 패치(patch) 적용\n② 시스템관리자는\
    \ 인위적 또는 자연적인 원인으로 인한 정보통신시스템의 장애 발생에 대비하여 시스템 이원화, 백업관리, 복구 등 종합적인 재난복구 대책을 수립ㆍ시행하여야\
    \ 하며 재난복구 시스템은 다음 각호와 같다.\n1. 중요자료의 이중화 백업 시스템 구축\n2. 서버와 물리적으로 이격된 공간에 별도의 백업\
    \ 시스템 구축\n3. 실시간 백업시스템 구축\n③ 시스템관리자는 정보통신시스템을 이용하기 위한 사용자계정을 발급하고 비인가자에게불필요한 서비스를\
    \ 허용하지 않도록 보안기능을 설정하여야 한다.\n④ 시스템관리자는 비밀번호 등 사용자 식별\n  검토 필요: true\n- [CC-006]\
    \ 제6조(보조기억매체 보안관리) 준수 여부 확인: 제6조(보조기억매체 보안관리) ① 보조기억매체의 관리책임자는 사용자의 소속부서장이 되며\
    \ 관리책임자는 업무용 보조기억매체를 별지 제1호 서식을 이용하여 관리(등록, 파기, 반출, 반입)하여야 하며, 등록되지 않은 매체는 사용할\
    \ 수 없다.\n② 중요 자료는 반드시 암호가 설정되거나 보안프로그램이 적용된 보조기억매체에 저장한다.\n③ 암호가 설정되거나 보안프로그램이\
    \ 적용된 보조기억매체를 사용할 경우공 (심각도: MEDIUM)\n  근거 조항: 제6조\n  근거 원문: 제6조(보조기억매체 보안관리) ①\
    \ 보조기억매체의 관리책임자는 사용자의 소속부서장이 되며 관리책임자는 업무용 보조기억매체를 별지 제1호 서식을 이용하여 관리(등록, 파기,\
    \ 반출, 반입)하여야 하며, 등록되지 않은 매체는 사용할 수 없다.\n② 중요 자료는 반드시 암호가 설정되거나 보안프로그램이 적용된 보조기억매체에\
    \ 저장한다.\n③ 암호가 설정되거나 보안프로그램이 적용된 보조기억매체를 사용할 경우공인기관 등의 보안적합성 검증을 받은 제품을 사용한다.\n\
    ④ 보조기억매체 분실 시 사용자는 즉시 관리책임자에게 보고한다.\n⑤ 전산담당부서에서는 필요 시 각 부서의 관리대장을 점검을 할 수 있다\n\
    ⑥ 연구원은 보조기억매체를 관리하기 위하여 관리시스템을 활용할 수 있으며 보안정책 및 운영기준은 다음 각 호와 같다.\n1. 이 시스템의 목적을\
    \ 위해 전 직원은 회사에서 사용하고자 하는 개인용컴퓨터는 보조기억매체 관리를 위한 클라이언트 프로그램을 설치해야 한다.\n2. 회사에서 유출되는\
    \ 모든 자료에 대하여 동 시스\n  검토 필요: true\n- [CC-007] 제7조(개인용 컴퓨터 보안관리) 준수 여부 확인: 제7조(개인용\
    \ 컴퓨터 보안관리) ① 소속 부서장은 회사 소유의 개인용 컴퓨터(데스크톱, 노트북, 일체형, 태블릿, 그 밖의 형태의 정보처리기기를 포함하여\
    \ 이하 이 조에서 같다)의 취급자 및 보안 관리책임자를 지정하여야 한다.\n② 회사 소유의 개인용 컴퓨터로 전산망을 사용하고자 하는 직원은\
    \ 전산부서에 등록요청을 하여야 하며 전산부서의 등록에 의하여 사용한다. 또한 이미 사용 중인 개인용 컴퓨터 (심각도: MEDIUM)\n \
    \ 근거 조항: 제7조\n  근거 원문: 제7조(개인용 컴퓨터 보안관리) ① 소속 부서장은 회사 소유의 개인용 컴퓨터(데스크톱, 노트북, 일체형,\
    \ 태블릿, 그 밖의 형태의 정보처리기기를 포함하여 이하 이 조에서 같다)의 취급자 및 보안 관리책임자를 지정하여야 한다.\n② 회사 소유의\
    \ 개인용 컴퓨터로 전산망을 사용하고자 하는 직원은 전산부서에 등록요청을 하여야 하며 전산부서의 등록에 의하여 사용한다. 또한 이미 사용 중인\
    \ 개인용 컴퓨터를 교체하는 경우에도 이와 같다.\n③ 개인 소유의 개인용 컴퓨터를 주요정보가 처리, 보관되는 연구원 내부에 반입하여 사용할\
    \ 수 없다. 다만, 부득이한 경우에는 소속 부서의 장의 승인을 받아 반입할 수 있다.\n④ 회사 소유의 개인용 컴퓨터를 수리 또는 교체하는\
    \ 경우 정보자료를 모두 삭제하거나 하드디스크를 분리 제거 후 수리의뢰 하여야 한다.\n⑤ 개인용 컴퓨터 사용자는 암호 설정 및 백신프로그램을\
    \ 설치하여 보안에 만전을 기한다\n⑥ 소속부서장은 이동 가능한 개인용 컴퓨터(노트북, 태블릿, 일체형 등)의\n  검토 필요: true\n\
    - [CC-008] 제8조(이메일 및 통신망 이용) 준수 여부 확인: 제8조(이메일 및 통신망 이용) ① 시스템관리자(전산부서)는 기술정보\
    \ 보안을 위하여 내부통신망을 이용하여 대내외로 수발신하는 이메일 등을 통해 전송되는 자료에 대해서는 일정기간(3년 이내) 내역을 보존하여야\
    \ 한다.\n② 시스템관리자(전산부서)는 직원 및 근무자의 업무용 이메일 사용을 위한 개인별 이메일계정(ID)을 부여하여야 하며 직원이 퇴직할\
    \ 경우 즉시 이를 폐쇄하여야 한다. 다만, 업무협력 (심각도: MEDIUM)\n  근거 조항: 제8조\n  근거 원문: 제8조(이메일 및\
