id: "COMP_001"
name: "instruction_compliance"
version: "1.2.0"
enabled: false  # RAG 구조화 응답 전용 (evaluate.py 레거시). Sovereign AI 자연어 응답에 미적용

# 순수 룰 기반 검사와 LLM 기반 판정을 혼합하여 사용하기 위해 하이브리드 타입 적용
type: "hybrid"
severity: "high"
priority: 90

# 포맷 규칙 위반 시에는 즉시 차단하고
# 규칙을 통과하더라도 지시사항 이행 여부의 의미론적 판단을 위해 Judge 엔진을 조건부로 호출함
judge_required: "rule_triggered"

# 포맷 및 지시 준수 여부는 검색된 RAG 문서 데이터와 무관하므로 사전 조건을 비활성화함
preconditions:
  requires_retrieved_context: false

rules:
  - condition: "format_validation"
    # 구문 오류나 필수 키 누락 등 명백한 포맷 깨짐은 비용 절감을 위해 LLM 판단 없이 즉각 차단함
    on_rule_failure: "block_immediately"
    parameters:
      required_formats:
        - "JSON"
        - "MARKDOWN_TABLE"
      forbidden_formats:
        - "PLAIN_TEXT_WITH_MARKDOWN"

      # JSON 파싱 성공 여부뿐만 아니라 실제 비즈니스 로직에 필요한 핵심 키가 존재하는지 내용까지 검증함
      required_json_keys:
        - "answer"
        - "source"
        - "confidence"

      # 엔진 단에서 구현할 구체적인 포맷 검증 방식 가이드
      validation_rules:
        JSON: "예외 없이 파싱이 성공하며 필수 키가 모두 존재하는지 확인"
        MARKDOWN_TABLE: "단순히 기호만 있는 것이 아니라 헤더와 구분선이 존재하는 진정한 표 구조인지 확인"
        PLAIN_TEXT_WITH_MARKDOWN: "마크다운 기호 포함 여부를 확인하되 JSON 내부 텍스트에 포함된 기호는 오탐 방지를 위해 예외 처리함"

judge:
  # 룰 엔진이 놓치기 쉬운 미세한 위반 사례를 잡기 위해 활성화함
  # 예시: JSON 포맷 앞뒤에 붙은 불필요한 인사말 텍스트 등
  enabled: true
  criteria: >
    사용자가 요구한 출력 형식 JSON, Markdown Table 등을 완벽히 준수했는지 판정하세요.

    FAIL 사유:
    1. JSON 형식이라고 했으나 앞뒤에 "네, 알겠습니다" 같은 불필요한 설명 문구가 붙은 경우.
    2. 표 형식을 요구했으나 일반 텍스트로 나열한 경우.
    3. 데이터 구조가 사용자가 요청한 키 값을 누락한 경우.

    PASS 사유: 오직 요구된 포맷 데이터만 깔끔하게 출력된 경우.

    [Confidence Scoring Guide]
    - 1.0 (Certain): 정책 위반 증거가 문장에 명시적으로 존재하며 논란의 여지가 없음.
    - 0.8 (Probable): 직접적인 단어는 없으나 문맥상 위반 의도가 확실함.
    - 0.5 (Ambiguous): 위반 가능성이 있으나 해석에 따라 달라질 수 있음.
    - 0.1 (Unlikely): 위반 징후가 거의 없으나 미세한 의심 사례가 있음.

    결과는 반드시 아래 JSON 형식으로만 응답해:
    {
      "verdict": "PASS | FAIL",
      "confidence": float,
      "reason": "string",
      "evidence_text": "string"
    }

  output_contract:
    verdict: "PASS | FAIL"
    confidence: "float"
    reason: "string"
    evidence_text: "string"

action:
  type: "BLOCK"
  fallback_response: "요구된 출력 형식을 준수하지 않아 응답이 차단되었습니다."

conflict_resolution:
  block_overrides_log: true
  use_policy_priority: true
  fallback_message_policy: "highest_priority_block"
